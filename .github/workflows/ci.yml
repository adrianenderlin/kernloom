name: CI

on:
  pull_request:
  push:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5 :contentReference[oaicite:0]{index=0}

      - name: Setup Go
        uses: actions/setup-go@v6 :contentReference[oaicite:1]{index=1}
        with:
          go-version-file: go.mod

      - name: Go fmt
        run: test -z "$(gofmt -l .)"

      - name: Go test
        run: go test ./...

      - name: Install clang/llvm for BPF
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm make

      - name: Build BPF object
        run: make -C shield/bpf